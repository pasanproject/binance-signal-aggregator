<!DOCTYPE html>
<html>
<head>
    <title>Binance Signal Aggregator</title>
    <style>
        body { font-family: Arial; background: #0f0f0f; color: #0f0; padding: 20px; }
        .signal { background: #1a1a1a; margin: 10px 0; padding: 15px; border-radius: 8px; }
        .buy { border-left: 5px solid #00ff00; }
        .sell { border-left: 5px solid #ff0000; }
    </style>
</head>
<body>
    <h1>📈 Binance Trading Signals</h1>
    <div id="signals"></div>

    <script>
        async function loadSignals() {
            const res = await fetch('/signals');
            const data = await res.json();
            let html = '';
            data.forEach(s => {
                const type = s.message.toLowerCase().includes('buy') ? 'buy' : 'sell';
                html += `<div class="signal ${type}">
                    <strong>${s.time}</strong> - ${s.channel}<br>
                    ${s.message}
                </div>`;
            });
            document.getElementById('signals').innerHTML = html;
        }
        setInterval(loadSignals, 5000);
        loadSignals();
    </script>
</body>
</html>
